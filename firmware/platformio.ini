[env:m5stack-fire]
platform = espressif32
board = m5stack-fire
framework = arduino

monitor_speed = 115200
upload_speed = 1500000
; PSRAM disabled: frees GPIO 16/17 so Port C is usable as a generic GPIO
; (e.g. for a NeoPixel matrix). All buffers now live in DRAM.
; board_build.psram = enable

; Required libraries
lib_deps =
    m5stack/M5Stack @ ^0.4.0
    bblanchon/ArduinoJson @ ^6.21.0
    fastled/FastLED @ ^3.6.0

; Build flags
build_flags =
    -Wno-unused-variable
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Serial port for monitoring (M5Stack Fire enumerates as COM8 on this PC)
monitor_port = COM8
