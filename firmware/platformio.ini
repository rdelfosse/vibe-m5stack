[env:m5stack-fire]
platform = espressif32
board = m5stack-fire
framework = arduino

monitor_speed = 115200
upload_speed = 1500000
; PSRAM enabled : déplace le sprite anim (115 KB) en PSRAM, libère le DRAM
; pour BluetoothSerial (~50 KB pour Bluedroid). Sans ça, le BT crash en
; LoadProhibited dans tlsf_block_size_max au moment du btc_spp_init parce
; que le heap DRAM est trop fragmenté/saturé. Coût : GPIO 16/17 = Port C
; n'est plus utilisable comme GPIO générique (matrix C NeoPixel désactivée).
board_build.psram = enable

; Required libraries
lib_deps =
    m5stack/M5Stack @ ^0.4.0
    bblanchon/ArduinoJson @ ^6.21.0
    fastled/FastLED @ ^3.6.0

; Build flags
build_flags =
    -Wno-unused-variable
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Serial port for monitoring (M5Stack Fire enumerates as COM8 on this PC)
monitor_port = COM8
